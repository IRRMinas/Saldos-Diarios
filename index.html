<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saldos Diários | Liquidações</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            padding: 24px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { font-size: 1.8rem; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .sub { color: #64748b; margin-bottom: 24px; }
        .badge { background: #f59e0b20; color: #f59e0b; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 24px 0;
        }
        .kpi-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #334155;
        }
        .kpi-card h3 { font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; }
        .kpi-card .value { font-size: 2rem; font-weight: bold; margin-top: 8px; }
        
        .panel {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            margin: 24px 0;
            border: 1px solid #f59e0b30;
        }
        .panel h2 {
            font-size: 1.2rem;
            border-left: 4px solid #f59e0b;
            padding-left: 16px;
            margin-bottom: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th, td {
            text-align: left;
            padding: 12px 8px;
            border-bottom: 1px solid #334155;
        }
        th { color: #94a3b8; font-weight: 600; }
        .text-right { text-align: right; }
        
        .chip {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.8rem;
        }
        .chip-before { background: #334155; color: #cbd5e1; }
        .chip-liq { background: #7f1a1a; color: #fca5a5; }
        .chip-after { background: #064e3b; color: #6ee7b7; }
        
        .progress-bar {
            display: inline-block;
            width: 70px;
            height: 5px;
            background: #334155;
            border-radius: 4px;
            overflow: hidden;
            vertical-align: middle;
            margin-left: 8px;
        }
        .progress-fill {
            height: 100%;
            background: #f59e0b;
            border-radius: 4px;
        }
        
        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .filters input {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 10px 16px;
            border-radius: 30px;
            color: white;
            flex: 1;
            min-width: 180px;
        }
        .filters input::placeholder { color: #64748b; }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .card:hover { transform: translateY(-3px); border-color: #f59e0b; }
        .card .proc { font-weight: bold; font-size: 0.9rem; color: #f1f5f9; margin: 8px 0; }
        .card .fav { color: #94a3b8; font-size: 0.8rem; }
        .saldo { font-size: 1.3rem; font-weight: bold; margin-top: 12px; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }
        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #94a3b8;
        }
        hr { border-color: #334155; margin: 16px 0; }
        .loading { text-align: center; padding: 60px; color: #64748b; }
        button {
            background: #f59e0b;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            color: #0f172a;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Saldos Diários <span class="badge">Liquidações ativas</span></h1>
    <div class="sub">Monitoramento de saldos com liquidações (colunas S–Y)</div>

    <div class="kpi-grid" id="kpiArea"></div>

    <div class="panel" id="liqPanel" style="display: none;">
        <h2>🔥 Liquidações do dia</h2>
        <div style="overflow-x: auto;">
            <table id="liqTable">
                <thead><tr><th>Favorecido</th><th>Elemento · Processo</th><th class="text-right">Saldo anterior</th><th class="text-right">Liquidado</th><th class="text-right">Saldo atual</th><th class="text-right">Consumo</th></tr></thead>
                <tbody id="liqBody"></tbody>
                <tfoot id="liqFoot"></tfoot>
            </table>
        </div>
    </div>

    <div class="filters">
        <input type="text" id="searchGlobal" placeholder="🔍 Busca geral...">
        <input type="text" id="searchProcesso" placeholder="📄 Nº processo...">
        <input type="text" id="searchFavorecido" placeholder="🏢 Favorecido...">
    </div>

    <div id="cardsContainer" class="card-grid"></div>
    <div id="emptyState" class="loading">Carregando dados...</div>
</div>

<div id="modal" class="modal"><div class="modal-content"><span class="close" onclick="closeModal()">&times;</span><div id="modalBody"></div></div></div>

<script>
    // 🔥 SEU URL DO GOOGLE APPS SCRIPT (proxy sem CORS)
    const CSV_URL = "https://script.google.com/macros/s/AKfycbxgjltMj72B_8Zd-46iPAiMYu2S7Y-hIYLOk-N4CdDXYrE9_ioYCw79tdpkrGYLRxTv-w/exec";
    
    let allData = [];
    let filteredData = [];
    let liquidacoes = [];
    let headers = [];
    
    // Índices das colunas da planilha
    const IDX_FAV = 7;      // coluna H
    const IDX_PROC = 12;    // coluna M
    const IDX_SALDO = 17;   // coluna R
    const LIQ_START = 18;   // coluna S
    const LIQ_END = 25;     // coluna Y
    
    function parseCSV(text) {
        const rows = [];
        let inQ = false, cur = '', row = [];
        for(let i = 0; i < text.length; i++) {
            const ch = text[i];
            if(ch === '"') inQ = !inQ;
            else if(ch === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
            else if(ch === '\n' && !inQ) { row.push(cur.trim()); if(row.some(c=>c)) rows.push(row); row = []; cur = ''; }
            else cur += ch;
        }
        if(cur || row.length) { row.push(cur.trim()); if(row.some(c=>c)) rows.push(row); }
        return rows;
    }
    
    function parseMoney(v) {
        if(!v) return 0;
        let s = String(v).replace(/R\$\s*/g, '').trim();
        if(s === '-' || s === '') return 0;
        s = s.replace(/\./g, '').replace(',', '.');
        return parseFloat(s) || 0;
    }
    
    function formatMoney(v) {
        return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
    }
    
    async function loadData() {
        try {
            document.getElementById('emptyState').innerHTML = '⏳ Carregando dados da planilha...';
            document.getElementById('emptyState').style.display = 'block';
            
            const resp = await fetch(CSV_URL + '?t=' + Date.now());
            if(!resp.ok) throw new Error(`HTTP ${resp.status} - ${resp.statusText}`);
            
            const text = await resp.text();
            console.log("CSV carregado, primeiros 200 caracteres:", text.substring(0, 200));
            
            const allRows = parseCSV(text);
            if(allRows.length < 2) throw new Error('CSV sem dados');
            
            headers = allRows[0];
            console.log("Cabeçalhos encontrados:", headers.slice(0, 20));
            
            // Tabela principal (A-R)
            allData = [];
            for(let i = 1; i < allRows.length; i++) {
                const row = allRows[i].slice(0, LIQ_START);
                const proc = String(row[IDX_PROC] || '').trim();
                const fav = String(row[IDX_FAV] || '').trim();
                if(proc && fav && proc !== 'Total' && fav !== 'Total' && proc.length > 3) {
                    allData.push(row);
                }
            }
            
            console.log(`Linhas na tabela principal: ${allData.length}`);
            
            // Tabela de liquidações (S-Y)
            const liqRows = [];
            for(let i = 1; i < allRows.length; i++) {
                const row = allRows[i].slice(LIQ_START, LIQ_END);
                const favLiq = String(row[0] || '').trim();
                if(favLiq && favLiq !== 'Total' && favLiq !== '') {
                    const procLiq = String(row[1] || '').trim();
                    if(procLiq && procLiq !== 'Total') liqRows.push(row);
                }
            }
            
            console.log(`Linhas de liquidação extraídas: ${liqRows.length}`);
            
            // Mapa de liquidações
            const liqMap = new Map();
            for(const row of liqRows) {
                const fav = row[0]?.trim();
                const proc = row[1]?.trim();
                if(!fav || !proc) continue;
                const key = `${fav}|||${proc}`;
                if(!liqMap.has(key)) {
                    liqMap.set(key, {
                        total: 0,
                        elem: row[2] || '',
                        sub: row[3] || '',
                        pi: row[5] || ''
                    });
                }
                liqMap.get(key).total += parseMoney(row[6]);
            }
            
            console.log(`Mapa de liquidações: ${liqMap.size} chaves`);
            
            // Cruzar dados
            liquidacoes = [];
            const seen = new Set();
            for(const row of allData) {
                const fav = row[IDX_FAV]?.trim();
                const proc = row[IDX_PROC]?.trim();
                if(!fav || !proc) continue;
                const key = `${fav}|||${proc}`;
                if(liqMap.has(key) && !seen.has(key)) {
                    seen.add(key);
                    const liq = liqMap.get(key);
                    const saldoAtual = parseMoney(row[IDX_SALDO]);
                    const saldoAntes = saldoAtual + liq.total;
                    liquidacoes.push({
                        favorecido: fav,
                        processo: proc,
                        saldoAntes: saldoAntes,
                        liquidado: liq.total,
                        saldoDepois: saldoAtual,
                        pct: saldoAntes > 0 ? (liq.total / saldoAntes * 100) : 0,
                        elem: liq.elem,
                        sub: liq.sub,
                        pi: liq.pi
                    });
                }
            }
            
            console.log(`Matches de liquidação encontradas: ${liquidacoes.length}`);
            
            filteredData = [...allData];
            renderDashboard();
            renderLiquidacoes();
            updateKPIs();
            
            document.getElementById('emptyState').style.display = 'none';
            
        } catch(err) {
            console.error('Erro detalhado:', err);
            document.getElementById('emptyState').innerHTML = `
                <div style="text-align:center; padding:40px;">
                    <p style="color:#ef4444;">❌ Erro ao carregar dados</p>
                    <p style="color:#64748b; font-size:0.9rem;">${err.message}</p>
                    <button onclick="loadData()">🔄 Tentar novamente</button>
                </div>
            `;
            document.getElementById('emptyState').style.display = 'block';
        }
    }
    
    function renderLiquidacoes() {
        const panel = document.getElementById('liqPanel');
        const tbody = document.getElementById('liqBody');
        const tfoot = document.getElementById('liqFoot');
        
        if(!liquidacoes.length) {
            panel.style.display = 'none';
            return;
        }
        
        panel.style.display = 'block';
        
        let totalAntes = 0, totalLiq = 0, totalDepois = 0;
        const rows = liquidacoes.map(l => {
            totalAntes += l.saldoAntes;
            totalLiq += l.liquidado;
            totalDepois += l.saldoDepois;
            const pct = Math.min(l.pct, 100);
            const barColor = pct > 90 ? '#ef4444' : pct > 60 ? '#f59e0b' : '#10b981';
            return `<tr>
                <td><strong>${l.favorecido}</strong></td>
                <td>${l.elem}/${l.sub} · ${l.processo} ${l.pi ? `· PI ${l.pi}` : ''}</td>
                <td class="text-right"><span class="chip chip-before">${formatMoney(l.saldoAntes)}</span></td>
                <td class="text-right"><span class="chip chip-liq">-${formatMoney(l.liquidado)}</span></td>
                <td class="text-right"><span class="chip chip-after">${formatMoney(l.saldoDepois)}</span></td>
                <td class="text-right">${pct.toFixed(1)}%<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${barColor};"></div></div></td>
            </tr>`;
        }).join('');
        
        tbody.innerHTML = rows;
        tfoot.innerHTML = `<tr style="background:#0f172a; border-top:2px solid #f59e0b;">
            <td colspan="2"><strong>TOTAIS · ${liquidacoes.length} ocorrências</strong></td>
            <td class="text-right"><span class="chip chip-before">${formatMoney(totalAntes)}</span></td>
            <td class="text-right"><span class="chip chip-liq">-${formatMoney(totalLiq)}</span></td>
            <td class="text-right"><span class="chip chip-after">${formatMoney(totalDepois)}</span></td>
            <td class="text-right"></td>
        </tr>`;
    }
    
    function renderDashboard() {
        const container = document.getElementById('cardsContainer');
        const empty = document.getElementById('emptyState');
        
        if(!filteredData.length) {
            container.innerHTML = '';
            empty.style.display = 'block';
            empty.innerHTML = '📭 Nenhum dado encontrado';
            return;
        }
        
        empty.style.display = 'none';
        container.innerHTML = filteredData.map((row, idx) => {
            const processo = row[IDX_PROC] || 'N/A';
            const favorecido = row[IDX_FAV] || 'N/A';
            const saldo = parseMoney(row[IDX_SALDO]);
            const isPos = saldo >= 0;
            return `<div class="card" onclick="showModal(${idx})">
                <div style="display:flex; justify-content:space-between;">
                    <span style="color:#f59e0b;">📄</span>
                    <span style="color:${isPos ? '#10b981' : '#ef4444'};">●</span>
                </div>
                <div class="proc">${escapeHtml(processo.substring(0, 35))}${processo.length > 35 ? '...' : ''}</div>
                <div class="fav">${escapeHtml(favorecido.substring(0, 40))}${favorecido.length > 40 ? '...' : ''}</div>
                <div class="saldo" style="color:${isPos ? '#34d399' : '#f87171'}">${formatMoney(saldo)}</div>
            </div>`;
        }).join('');
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    function updateKPIs() {
        let totalSaldo = 0;
        const favSet = new Set();
        for(const row of filteredData) {
            totalSaldo += parseMoney(row[IDX_SALDO]);
            favSet.add(row[IDX_FAV]);
        }
        document.getElementById('kpiArea').innerHTML = `
            <div class="kpi-card"><h3>💰 Saldo total</h3><div class="value">${formatMoney(totalSaldo)}</div></div>
            <div class="kpi-card"><h3>📋 Processos</h3><div class="value">${filteredData.length}</div></div>
            <div class="kpi-card"><h3>🏢 Favorecidos</h3><div class="value">${favSet.size}</div></div>
        `;
    }
    
    function showModal(idx) {
        const row = filteredData[idx];
        if(!row) return;
        const modal = document.getElementById('modal');
        const modalBody = document.getElementById('modalBody');
        modalBody.innerHTML = `
            <h2 style="margin-bottom:16px;">📄 ${escapeHtml(row[IDX_PROC] || 'N/A')}</h2>
            <p><strong>Favorecido:</strong> ${escapeHtml(row[IDX_FAV] || 'N/A')}</p>
            <p><strong>Saldo:</strong> ${formatMoney(parseMoney(row[IDX_SALDO]))}</p>
            <hr>
            <div style="display:grid; gap:8px; grid-template-columns:1fr 1fr;">
                ${headers.map((h,i) => {
                    if(i !== IDX_FAV && i !== IDX_PROC && i !== IDX_SALDO && row[i] && row[i] !== '') {
                        return `<div><small style="color:#64748b;">${escapeHtml(h)}</small><br>${escapeHtml(row[i])}</div>`;
                    }
                    return '';
                }).join('')}
            </div>
        `;
        modal.style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }
    
    // Filtros
    function applyFilters() {
        const gT = document.getElementById('searchGlobal').value.toLowerCase();
        const pT = document.getElementById('searchProcesso').value.toLowerCase();
        const fT = document.getElementById('searchFavorecido').value.toLowerCase();
        
        filteredData = allData.filter(row => {
            const proc = String(row[IDX_PROC] || '').toLowerCase();
            const fav = String(row[IDX_FAV] || '').toLowerCase();
            const all = row.join(' ').toLowerCase();
            return proc.includes(pT) && fav.includes(fT) && all.includes(gT);
        });
        
        renderDashboard();
        updateKPIs();
        
        // Filtra liquidações também
        const filteredLiq = liquidacoes.filter(l => {
            const proc = l.processo.toLowerCase();
            const fav = l.favorecido.toLowerCase();
            return proc.includes(pT) && fav.includes(fT);
        });
        
        const tbody = document.getElementById('liqBody');
        const tfoot = document.getElementById('liqFoot');
        if(filteredLiq.length) {
            let totalAntes = 0, totalLiq = 0, totalDepois = 0;
            const rows = filteredLiq.map(l => {
                totalAntes += l.saldoAntes;
                totalLiq += l.liquidado;
                totalDepois += l.saldoDepois;
                const pct = Math.min(l.pct, 100);
                const barColor = pct > 90 ? '#ef4444' : pct > 60 ? '#f59e0b' : '#10b981';
                return `<tr>
                    <td><strong>${l.favorecido}</strong></td>
                    <td>${l.elem}/${l.sub} · ${l.processo} ${l.pi ? `· PI ${l.pi}` : ''}</td>
                    <td class="text-right"><span class="chip chip-before">${formatMoney(l.saldoAntes)}</span></td>
                    <td class="text-right"><span class="chip chip-liq">-${formatMoney(l.liquidado)}</span></td>
                    <td class="text-right"><span class="chip chip-after">${formatMoney(l.saldoDepois)}</span></td>
                    <td class="text-right">${pct.toFixed(1)}%<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${barColor};"></div></div></td>
                </tr>`;
            }).join('');
            tbody.innerHTML = rows;
            tfoot.innerHTML = `<tr style="background:#0f172a; border-top:2px solid #f59e0b;">
                <td colspan="2"><strong>TOTAIS · ${filteredLiq.length} ocorrências</strong></td>
                <td class="text-right"><span class="chip chip-before">${formatMoney(totalAntes)}</span></td>
                <td class="text-right"><span class="chip chip-liq">-${formatMoney(totalLiq)}</span></td>
                <td class="text-right"><span class="chip chip-after">${formatMoney(totalDepois)}</span></td>
                <td class="text-right"></td>
            </tr>`;
            document.getElementById('liqPanel').style.display = 'block';
        } else {
            document.getElementById('liqPanel').style.display = 'none';
        }
    }
    
    document.getElementById('searchGlobal').addEventListener('input', applyFilters);
    document.getElementById('searchProcesso').addEventListener('input', applyFilters);
    document.getElementById('searchFavorecido').addEventListener('input', applyFilters);
    
    loadData();
</script>
</body>
</html>
